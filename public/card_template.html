<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte VIP Maison 7</title>
    <style>
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 350px; height: 200px; background: #000; color: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); font-family: 'Inter', sans-serif; }
        .logo { font-size: 1.2rem; letter-spacing: 0.5em; margin-bottom: 25px; }
        .qr-container { width: 80px; height: 80px; background: #fff; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">MAISON 7</div>
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://maison-7.vercel.app/merci.html&color=000&bgcolor=fff" alt="QR Code" style="width: 100%; height: 100%; display: block;">
        </div>
    </div>
</body>
</html>
