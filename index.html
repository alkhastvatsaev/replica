<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    <title>MAISON 7</title>
</head>
<body>
    <div class="app-viewport">
        <header>
            <div class="logo-stack">
                <span class="logo-top">MAISON</span>
                <span class="logo-bottom">7</span>
            </div>
        </header>

        <!-- SELECTEURS -->
        <div class="controls-bar">
            <div class="currency-selector">
                <button class="currency-btn active" onclick="setCurrency('EUR', '€')">€</button>
                <button class="currency-btn" onclick="setCurrency('USD', '$')">$</button>
                <button class="currency-btn" onclick="setCurrency('AED', 'د.إ')">د.إ</button>
                <button class="currency-btn" onclick="setCurrency('KZT', '₸')">₸</button>
            </div>
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLanguage('fr')">FR</button>
                <button class="lang-btn" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
            </div>
        </div>

        <div class="catalog-container">
            <!-- CARTIER -->
            <div class="brand-divider">
                <img src="images/logo.png" style="height:14px; filter:grayscale(1) invert(0);" alt="Cartier">
            </div>
            <div id="cartier-grid" class="product-grid"></div>

            <!-- VAN CLEEF -->
            <div class="brand-divider">
                <img src="images/vancleef-logo.jpg" style="height:45px; filter:grayscale(1) invert(0);" alt="VCA">
            </div>
            <div id="vca-grid" class="product-grid"></div>

            <!-- BULGARI -->
            <div class="brand-divider">
                <img src="bulgari/logo.png" style="height: 18px; filter: grayscale(1) invert(0);" alt="Bulgari">
            </div>
            <div id="bulgari-grid" class="product-grid"></div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="js/inventory.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
