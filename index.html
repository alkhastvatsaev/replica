<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    <title>MAISON 7</title>
</head>
<body>
    <div class="app-viewport">
        <header>
            <div class="logo-stack">
                <span class="logo-top">MAISON</span>
                <span class="logo-bottom">7</span>
            </div>
        </header>

        <div class="catalog-container">
            <!-- CARTIER -->
            <div class="brand-divider">
                <img src="images/logo.png" class="logo-cartier" alt="Cartier">
            </div>
            <div id="cartier-grid" class="product-grid"></div>

            <!-- VAN CLEEF -->
            <div class="brand-divider">
                <img src="images/vancleef-logo.jpg" class="logo-vca" alt="VCA">
            </div>
            <div id="vca-grid" class="product-grid"></div>

            <!-- BULGARI -->
            <div class="brand-divider">
                <img src="bulgari/logo.png" class="logo-bulgari" alt="Bulgari">
            </div>
            <div id="bulgari-grid" class="product-grid"></div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="js/inventory.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
