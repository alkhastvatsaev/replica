<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    
    <title>REPLICA</title>
</head>
<body>
    <div class="app-viewport">
        <header>
            <img src="/images/logo.png" class="logo-img" alt="Cartier">
        </header>

        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-container">
                    <img src="/images/love-ring.png" class="minimal-img" alt="Bague Love">
                </div>
                <h2 data-name="Bague Love" data-name-ru="Кольцо Love" data-name-en="Love Ring" data-name-ar="خاتم Love">Bague Love</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="1075">1 075 €</span>
                    </div>
                    <div class="wa-buy-btn cartier" data-product="love" data-ref="CRB4084600" onclick="openCheckout('Bague Love', 1075, 'CRB4084600')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="/images/clou-ring.png" class="minimal-img" alt="Bague Juste un Clou">
                </div>
                <h2 data-name="Bague Juste un Clou" data-name-ru="Кольцо Juste un Clou" data-name-en="Juste un Clou Ring" data-name-ar="خاتم Juste un Clou">Bague Juste un Clou</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="725">725 €</span>
                    </div>
                    <div class="wa-buy-btn cartier" data-product="clou" data-ref="CRB4225900" onclick="openCheckout('Bague Juste un Clou', 725, 'CRB4225900')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="/images/clash-ring.png" class="minimal-img" alt="Bague Clash">
                </div>
                <h2 data-name="Bague Clash de Cartier" data-name-ru="Кольцо Clash" data-name-en="Clash Ring" data-name-ar="خاتم Clash">Bague Clash de Cartier</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="1275">1 275 €</span>
                    </div>
                    <div class="wa-buy-btn cartier" data-product="clash" data-ref="CRB4229800" onclick="openCheckout('Bague Clash', 1275, 'CRB4229800')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="/images/love-bracelet.png" class="minimal-img" alt="Bracelet Love">
                </div>
                <h2 data-name="Bracelet Love" data-name-ru="Браслет Love" data-name-en="Love Bracelet" data-name-ar="سوار Love">Bracelet Love</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="3925">3 925 €</span>
                    </div>
                    <div class="wa-buy-btn cartier" data-product="bracelet" data-ref="CRB6035517" onclick="openCheckout('Bracelet Love', 3925, 'CRB6035517')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="/images/trinity-ring.png" class="minimal-img" alt="Bague Trinity">
                </div>
                <h2 data-name="Bague Trinity" data-name-ru="Кольцо Trinity" data-name-en="Trinity Ring" data-name-ar="خاتم Trinity">Bague Trinity</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="925">925 €</span>
                    </div>
                    <div class="wa-buy-btn cartier" data-product="trinity" data-ref="CRB4052700" onclick="openCheckout('Bague Trinity', 925, 'CRB4052700')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Section Van Cleef & Arpels -->
        <div class="brand-divider">
            <img src="/images/vancleef-logo.jpg" alt="Van Cleef & Arpels">
        </div>
        <div class="product-grid" id="vca-grid">
            
            <div class="product-card">
                <div class="img-container">
                    <img src="/images/alhambra-bracelet.png" class="minimal-img" alt="Bracelet Alhambra">
                </div>
                <h2 data-name="Bracelet Alhambra" data-name-ru="Браслет Alhambra" data-name-en="Alhambra Bracelet" data-name-ar="سوار Alhambra">Bracelet Alhambra</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="2625">2 625 €</span>
                    </div>
                    <div class="wa-buy-btn vca" data-product="alhambra" data-ref="VCARA41800" onclick="openCheckout('Bracelet Alhambra', 2625, 'VCARA41800')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="/images/reversible-ring.png" class="minimal-img" alt="Bague Réversible">
                </div>
                <h2 data-name="Bague Réversible" data-name-ru="Кольцо Reversible" data-name-en="Reversible Ring" data-name-ar="خاتم Reversible">Bague Réversible</h2>
                <div class="price-row">
                    <div class="price-box">
                        <span class="sale-price" data-eur="3325">3 325 €</span>
                    </div>
                    <div class="wa-buy-btn vca" data-product="reversible" data-ref="VCARPGV500" onclick="openCheckout('Bague Réversible', 3325, 'VCARPGV500')">
                        <span data-i18n="buy">MESSAGE SELLER</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ─── I18N CONFIG ────────────────────────────────────────────────
        const WA_PHONE = "33745999118";
        
        const TRANSLATIONS = {
            fr: {
                buy: "MESSAGE SELLER",
                wa_msg: "Bonjour, je suis intéressé par ce produit : "
            },
            ru: {
                buy: "НАПИСАТЬ ПРОДАВЦУ",
                wa_msg: "Здравствуйте, меня интересует этот товар: "
            },
            en: {
                buy: "MESSAGE SELLER",
                wa_msg: "Hello, I am interested in this product: "
            },
            ar: {
                buy: "مراسلة البائع",
                wa_msg: "مرحباً، أنا مهتم بهذا المنتج: "
            }
        };

        const COUNTRY_MAP = {
            FR: { lang: 'fr', currency: 'EUR', symbol: '€' },
            BE: { lang: 'fr', currency: 'EUR', symbol: '€' },
            MA: { lang: 'fr', currency: 'MAD', symbol: 'MAD' },
            DZ: { lang: 'fr', currency: 'DZD', symbol: 'DZD' },
            RU: { lang: 'ru', currency: 'RUB', symbol: '₽' },
            KZ: { lang: 'ru', currency: 'KZT', symbol: '₸' },
            GB: { lang: 'en', currency: 'GBP', symbol: '£' },
            US: { lang: 'en', currency: 'USD', symbol: '$' },
            AE: { lang: 'ar', currency: 'AED', symbol: 'AED' },
            SA: { lang: 'ar', currency: 'SAR', symbol: 'SAR' },
        };

        let currentLang = 'fr';
        let currentCurrency = 'EUR';
        let currentSymbol = '€';
        let currentRates = { EUR: 1 };

        async function init() {
            try {
                const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
                const country = geo.country_code || 'FR';
                const config = COUNTRY_MAP[country] || { lang: 'en', currency: 'EUR', symbol: '€' };
                currentLang = config.lang;
                currentCurrency = config.currency;
                currentSymbol = config.symbol;

                if (currentCurrency !== 'EUR') {
                    const rates = await fetch(`https://open.er-api.com/v6/latest/EUR`).then(r => r.json());
                    if (rates.rates) currentRates = rates.rates;
                }

                applyLanguage(currentLang);
                convertAllPrices();

                if (currentLang === 'ar') document.documentElement.setAttribute('dir', 'rtl');

            } catch (e) {
                applyLanguage('fr');
            }
        }

        function applyLanguage(lang) {
            const t = TRANSLATIONS[lang] || TRANSLATIONS['fr'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            document.querySelectorAll('h2[data-name]').forEach(el => {
                const name = el.getAttribute(`data-name-${lang}`) || el.getAttribute('data-name');
                if (name) el.textContent = name;
            });
        }

        function convertAllPrices() {
            const rate = currentRates[currentCurrency] || 1;
            document.querySelectorAll('.sale-price[data-eur]').forEach(el => {
                const eur = parseInt(el.getAttribute('data-eur'));
                const converted = convertAndRound(eur, rate);
                el.textContent = formatPrice(converted, currentSymbol, currentCurrency);
            });
        }

        function convertAndRound(eurAmount, rate) {
            const raw = eurAmount * rate;
            if (raw < 1000) return Math.round(raw / 5) * 5;
            if (raw < 10000) return Math.round(raw / 50) * 50;
            return Math.round(raw / 500) * 500;
        }

        function formatPrice(amount, symbol, currency) {
            let formatted = (amount >= 10000) ? `${Math.round(amount / 1000)}k` : amount.toLocaleString();
            const symbolAfter = ['€', '₽', '₸', '₴'];
            return symbolAfter.includes(symbol) ? `${formatted} ${symbol}` : `${symbol} ${formatted}`;
        }

        // --- FONCTION DIRECTE AVEC RÉFÉRENCE ---
        function openCheckout(name, eurPrice, ref) {
            const t = TRANSLATIONS[currentLang] || TRANSLATIONS['fr'];
            const rate = currentRates[currentCurrency] || 1;
            const priceLocal = convertAndRound(eurPrice, rate);
            const priceStr = formatPrice(priceLocal, currentSymbol, currentCurrency);
            
            // Nouveau format de message avec référence
            const message = `${t.wa_msg} ${name.toUpperCase()} (Ref: ${ref} - ${priceStr})`;
            window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(message)}`, "_blank");
        }

        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
        }
    </script>
</body>
</html>
