<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="src/css/style.css" />
    <title>MAISON 7</title>
  </head>
  <body>
    <!-- LUXURY GATE (ENTRÉE PRIVÉE) -->
    <div id="entry-gate">
      <div class="gate-content">
        <div class="logo-stack gate-logo" id="gate-logo" style="cursor: pointer;">
          <span class="logo-top">MAISON</span>
          <span class="logo-bottom">7</span>
        </div>
        <button id="enter-button">COLLECTION</button>
      </div>
    </div>

    <div class="app-viewport">
      <!-- QR CODE OVERLAY -->
      <div id="qr-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20000; align-items:center; justify-content:center; flex-direction:column; color:white; cursor:pointer;">
        <p style="letter-spacing:0.3em; font-size:0.7rem; margin-bottom:2rem;">ACCÈS ÉPHÉMÈRE - VALABLE 60 MIN</p>
        <div id="qr-container" style="background:white; padding:15px; border-radius:10px;"></div>
        <p style="margin-top:2rem; font-size:0.8rem; opacity:0.6;">Cliquez pour fermer</p>
      </div>

      <header>
        <div class="logo-stack" id="main-logo" style="cursor:pointer;">
          <span class="logo-top">MAISON</span>
          <span class="logo-bottom">7</span>
        </div>
      </header>

      <div class="catalog-container">
        <!-- CARTIER -->
        <div class="brand-divider">
          <img src="assets/logos/cartier.png" class="logo-cartier" alt="Cartier" />
        </div>
        <div id="cartier-grid" class="product-grid"></div>

        <!-- VAN CLEEF -->
        <div class="brand-divider">
          <img src="assets/logos/vca.jpg" class="logo-vca" alt="VCA" />
        </div>
        <div id="vca-grid" class="product-grid"></div>

        <!-- BULGARI -->
        <div class="brand-divider">
          <img src="assets/logos/bulgari.png" class="logo-bulgari" alt="Bulgari" />
        </div>
        <div id="bulgari-grid" class="product-grid"></div>
      </div>
    </div>

    <!-- PWA -->
    <script src="src/pwa.js" type="module"></script>
    <!-- SCRIPTS -->
    <script src="src/js/app.js" type="module"></script>
    <script>
      // On expose openCheckout au global car il est appelé via onclick dans le HTML
      import { openCheckout, setCurrency, setLanguage } from './src/js/app.js';
      window.openCheckout = openCheckout;
      window.setCurrency = setCurrency;
      window.setLanguage = setLanguage;
    </script>
  </body>
</html>
